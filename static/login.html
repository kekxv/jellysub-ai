<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 — JellySub-AI</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="login-view">
    <div class="login-card">
        <div class="logo-mark" style="margin: 0 auto 1.5rem;">JS</div>
        <h1>管理后台</h1>
        <p>欢迎回到 JellySub-AI</p>

        <div id="error-msg" class="badge failed" style="display:none; width: 100%; margin-bottom: 1.5rem; padding: 0.75rem;"></div>

        <form id="login-form">
            <div class="form-group" style="text-align: left;">
                <label for="username">用户名</label>
                <input type="text" id="username" placeholder="输入您的用户名" required autocomplete="username">
            </div>
            <div class="form-group" style="text-align: left;">
                <label for="password">密码</label>
                <input type="password" id="password" placeholder="输入您的密码" required autocomplete="current-password">
            </div>
            <div class="form-group" style="text-align: left;">
                <label for="totp_code">2FA 验证码</label>
                <input type="text" id="totp_code" placeholder="6 位验证码 (可选)" maxlength="6" inputmode="numeric" autocomplete="one-time-code">
            </div>
            <button type="submit" class="btn btn-primary" id="login-btn" style="width: 100%; padding: 0.75rem; font-size: 1rem; margin-top: 1rem;">
                立即登录
            </button>
        </form>
    </div>

    <script>
        async function sha256(text) {
            if (crypto.subtle) {
                const buf = new TextEncoder().encode(text);
                const hash = await crypto.subtle.digest('SHA-256', buf);
                return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
            }
            // Fallback for insecure HTTP context (LAN access)
            const k = [0x428a2f98,0x71374491,0xb5c0fbcf,0xe9b5dba5,0x3956c25b,0x59f111f1,0x923f82a4,0xab1c5ed5,0xd807aa98,0x12835b01,0x243185be,0x550c7dc3,0x72be5d74,0x80deb1fe,0x9bdc06a7,0xc19bf174,0xe49b69c1,0xefbe4786,0x0fc19dc6,0x240ca1cc,0x2de92c6f,0x4a7484aa,0x5cb0a9dc,0x76f988da,0x983e5152,0xa831c66d,0xb00327c8,0xbf597fc7,0xc6e00bf3,0xd5a79147,0x06ca6351,0x14292967,0x27b70a85,0x2e1b2138,0x4d2c6dfc,0x53380d13,0x650a7354,0x766a0abb,0x81c2c92e,0x92722c85,0xa2bfe8a1,0xa81a664b,0xc24b8b70,0xc76c51a3,0xd192e819,0xd6990624,0xf40e3585,0x106aa070,0x19a4c116,0x1e376c08,0x2748774c,0x34b0bcb5,0x391c0cb3,0x4ed8aa4a,0x5b9cca4f,0x682e6ff3,0x748f82ee,0x78a5636f,0x84c87814,0x8cc70208,0x90befffa,0xa4506ceb,0xbef9a3f7,0xc67178f2];
            const buf = new TextEncoder().encode(text);
            const padLen = Math.ceil((buf.length + 9) / 64) * 64;
            const padded = new Uint8Array(padLen);
            padded.set(buf);
            padded[buf.length] = 0x80;
            const view = new DataView(padded.buffer);
            const bitLen = buf.length * 8;
            view.setUint32(padLen - 8, Math.floor(bitLen / 0x100000000), false);
            view.setUint32(padLen - 4, bitLen >>> 0, false);
            let h0 = 0x6a09e667, h1 = 0xbb67ae85, h2 = 0x3c6ef372, h3 = 0xa54ff53a, h4 = 0x510e527f, h5 = 0x9b05688c, h6 = 0x1f83d9ab, h7 = 0x5be0cd19;
            const w = new Uint32Array(64);
            for (let i = 0; i < padded.length; i += 64) {
                for (let j = 0; j < 16; j++) w[j] = view.getUint32(i + j * 4);
                for (let j = 16; j < 64; j++) {
                    const s0 = (w[j-15] >>> 7 | w[j-15] << 25) ^ (w[j-15] >>> 18 | w[j-15] << 14) ^ (w[j-15] >>> 3);
                    const s1 = (w[j-2] >>> 17 | w[j-2] << 15) ^ (w[j-2] >>> 19 | w[j-2] << 13) ^ (w[j-2] >>> 10);
                    w[j] = (w[j-16] + s0 + w[j-7] + s1) | 0;
                }
                let a = h0, b = h1, c = h2, d = h3, e = h4, f = h5, g = h6, hh = h7;
                for (let j = 0; j < 64; j++) {
                    const S1 = (e >>> 6 | e << 26) ^ (e >>> 11 | e << 21) ^ (e >>> 25 | e << 7);
                    const ch = (e & f) ^ (~e & g);
                    const temp1 = (hh + S1 + ch + k[j] + w[j]) | 0;
                    const S0 = (a >>> 2 | a << 30) ^ (a >>> 13 | a << 19) ^ (a >>> 22 | a << 10);
                    const maj = (a & b) ^ (a & c) ^ (b & c);
                    const temp2 = (S0 + maj) | 0;
                    hh = g; g = f; f = e; e = (d + temp1) | 0; d = c; c = b; b = a; a = (temp1 + temp2) | 0;
                }
                h0 = (h0 + a) | 0; h1 = (h1 + b) | 0; h2 = (h2 + c) | 0; h3 = (h3 + d) | 0;
                h4 = (h4 + e) | 0; h5 = (h5 + f) | 0; h6 = (h6 + g) | 0; h7 = (h7 + hh) | 0;
            }
            const result = new Uint8Array(32);
            const rv = new DataView(result.buffer);
            rv.setUint32(0, h0); rv.setUint32(4, h1); rv.setUint32(8, h2); rv.setUint32(12, h3);
            rv.setUint32(16, h4); rv.setUint32(20, h5); rv.setUint32(24, h6); rv.setUint32(28, h7);
            return Array.from(result).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('login-btn');
            const err = document.getElementById('error-msg');
            btn.disabled = true;
            btn.textContent = '验证中...';
            err.style.display = 'none';

            try {
                const username = document.getElementById('username').value;
                const password = document.getElementById('password').value;
                const inner = await sha256(password);
                const hash = await sha256(username + inner);

                const resp = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username,
                        password: hash,
                        totp_code: document.getElementById('totp_code').value,
                    }),
                });
                const data = await resp.json();
                if (resp.ok && data.status === 'ok') {
                    window.location.href = '/admin';
                } else {
                    err.textContent = data.detail || '用户名、密码或验证码错误';
                    err.style.display = 'block';
                }
            } catch {
                err.textContent = '网络连接超时';
                err.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.textContent = '立即登录';
            }
        });
    </script>
</body>
</html>
